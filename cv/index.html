    <script type="text/javascript">
        //remove CSS rules for hover on mobile devices
//http://stackoverflow.com/questions/23885255/how-to-remove-ignore-hover-css-style-on-touch-devices
var touch = 'ontouchstart' in document.documentElement
|| navigator.maxTouchPoints > 0
|| navigator.msMaxTouchPoints > 0;

if (touch) { // remove all :hover stylesheets
try { // prevent exception on browsers not supporting DOM styleSheets properly
    for (var si in document.styleSheets) {
        var styleSheet = document.styleSheets[si];
        if (!styleSheet.rules) continue;

        for (var ri = styleSheet.rules.length - 1; ri >= 0; ri--) {
            if (!styleSheet.rules[ri].selectorText) continue;

            if (styleSheet.rules[ri].selectorText.match(':hover')) {
                styleSheet.deleteRule(ri);
            }
        }
    }
} catch (ex) {}
}
    </script>

    <script type="text/javascript">
        // Fix scrollbar instability during loading
        document.addEventListener('DOMContentLoaded', function() {
            // Remove loading class after a short delay to ensure content is rendered
            setTimeout(function() {
                document.body.classList.remove('loading');
            }, 100);
        });

        // Also remove loading class when window is fully loaded
        window.addEventListener('load', function() {
            document.body.classList.remove('loading');
        });

        // Fallback: remove loading class after animations complete
        setTimeout(function() {
            document.body.classList.remove('loading');
        }, 1500);
    </script>
